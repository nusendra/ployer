name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  build-binary:
    name: Build Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ployer-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ployer-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libssl-dev:arm64 \
            pkg-config
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install build dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev pkg-config

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }} --package ployer-api

      - name: Package release
        run: |
          TAG=${GITHUB_REF_NAME}
          DIST="ployer-${TAG}-${{ matrix.asset_name }}"
          mkdir -p "$DIST"

          # Copy binary
          cp target/${{ matrix.target }}/release/ployer "$DIST/ployer"

          # Copy frontend static files
          mkdir -p "$DIST/public"
          cp -r frontend/build/. "$DIST/public/"

          # Copy config example
          mkdir -p "$DIST/config"
          cp config/default.toml "$DIST/config/default.toml"

          # Copy migrations
          cp -r migrations "$DIST/migrations"

          # Create archive
          tar -czf "${DIST}.tar.gz" "$DIST"

          # Also produce a plain binary for the install script
          cp target/${{ matrix.target }}/release/ployer ${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ployer-*.tar.gz
            ${{ matrix.asset_name }}
          generate_release_notes: true
